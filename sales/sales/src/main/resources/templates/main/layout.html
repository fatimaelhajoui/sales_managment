<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE | Sales App">Sales App</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
        --sidebar-w: 240px;
        --sidebar-collapsed-w: 64px;
        --blue:       #2563eb;
        --blue-dark:  #1d4ed8;
        --blue-light: #eff6ff;
        --bg:         #f0f2f5;
        --white:      #ffffff;
        --border:     #e4e4e7;
        --text:       #111111;
        --muted:      #888888;
        --danger:     #dc2626;
        --success:    #16a34a;
    }

    body {
        font-family: 'DM Sans', -apple-system, sans-serif;
        background: var(--bg);
        min-height: 100vh;
        display: flex;
    }

    /* ══════════════════════════════
       SIDEBAR
    ══════════════════════════════ */
    .sidebar {
        position: fixed;
        top: 0; left: 0;
        height: 100vh;
        width: var(--sidebar-w);
        background: var(--white);
        border-right: 1.5px solid var(--border);
        display: flex;
        flex-direction: column;
        transition: width 0.25s ease;
        z-index: 100;
        overflow: hidden;
    }

    .sidebar.collapsed {
        width: var(--sidebar-collapsed-w);
    }

    /* Brand */
    .sidebar-brand {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 16px;
        height: 64px;
        border-bottom: 1.5px solid var(--border);
        flex-shrink: 0;
        overflow: hidden;
        white-space: nowrap;
    }

    .brand-icon {
        width: 32px;
        height: 32px;
        background: var(--blue);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        color: white;
        font-size: 15px;
    }

    .brand-text {
        font-size: 16px;
        font-weight: 600;
        color: var(--text);
        letter-spacing: -0.2px;
        opacity: 1;
        transition: opacity 0.2s;
    }

    .sidebar.collapsed .brand-text { opacity: 0; pointer-events: none; }

    /* Nav */
    .sidebar-nav {
        flex: 1;
        padding: 12px 10px;
        overflow-y: auto;
        overflow-x: hidden;
    }

    .nav-section-label {
        font-size: 10px;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.8px;
        padding: 8px 8px 4px;
        white-space: nowrap;
        overflow: hidden;
        opacity: 1;
        transition: opacity 0.2s;
    }

    .sidebar.collapsed .nav-section-label { opacity: 0; }

    .nav-item {
        display: flex;
        align-items: center;
        gap: 11px;
        padding: 9px 10px;
        border-radius: 8px;
        text-decoration: none;
        color: #555;
        font-size: 14px;
        font-weight: 500;
        white-space: nowrap;
        transition: background 0.15s, color 0.15s;
        margin-bottom: 2px;
        overflow: hidden;
    }

    .nav-item:hover {
        background: var(--bg);
        color: var(--text);
        text-decoration: none;
    }

    .nav-item.active {
        background: var(--blue-light);
        color: var(--blue);
    }

    .nav-item .nav-icon {
        width: 20px;
        height: 20px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 15px;
    }

    .nav-item .nav-label {
        opacity: 1;
        transition: opacity 0.2s;
    }

    .sidebar.collapsed .nav-item .nav-label { opacity: 0; pointer-events: none; }

    /* Tooltip on collapsed */
    .nav-item {
        position: relative;
    }

    .sidebar.collapsed .nav-item::after {
        content: attr(data-tooltip);
        position: absolute;
        left: calc(var(--sidebar-collapsed-w) - 4px);
        background: #1e293b;
        color: white;
        font-size: 12px;
        padding: 5px 10px;
        border-radius: 6px;
        white-space: nowrap;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.15s;
        z-index: 200;
    }

    .sidebar.collapsed .nav-item:hover::after { opacity: 1; }

    /* Bottom section */
    .sidebar-bottom {
        padding: 12px 10px;
        border-top: 1.5px solid var(--border);
        flex-shrink: 0;
    }

    /* User info */
    .sidebar-user {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 10px;
        border-radius: 8px;
        margin-bottom: 4px;
        overflow: hidden;
        white-space: nowrap;
    }

    .user-avatar {
        width: 32px;
        height: 32px;
        background: var(--blue-light);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--blue);
        font-size: 13px;
        font-weight: 600;
        flex-shrink: 0;
    }

    .user-info {
        opacity: 1;
        transition: opacity 0.2s;
        overflow: hidden;
    }

    .sidebar.collapsed .user-info { opacity: 0; }

    .user-name {
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .user-role {
        font-size: 11px;
        color: var(--muted);
    }

    /* Logout */
    .logout-btn {
        display: flex;
        align-items: center;
        gap: 11px;
        width: 100%;
        padding: 9px 10px;
        border-radius: 8px;
        background: none;
        border: none;
        color: var(--danger);
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        font-family: inherit;
        white-space: nowrap;
        overflow: hidden;
        text-decoration: none;
        transition: background 0.15s;
        position: relative;
    }

    .logout-btn:hover { background: #fef2f2; }

    .logout-btn .nav-icon { flex-shrink: 0; width: 20px; display: flex; justify-content: center; }

    .logout-btn .nav-label {
        opacity: 1;
        transition: opacity 0.2s;
    }

    .sidebar.collapsed .logout-btn .nav-label { opacity: 0; }

    .sidebar.collapsed .logout-btn::after {
        content: 'Logout';
        position: absolute;
        left: calc(var(--sidebar-collapsed-w) - 4px);
        background: #1e293b;
        color: white;
        font-size: 12px;
        padding: 5px 10px;
        border-radius: 6px;
        white-space: nowrap;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.15s;
        z-index: 200;
    }

    .sidebar.collapsed .logout-btn:hover::after { opacity: 1; }

    /* Collapse toggle button */
    .collapse-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        border-radius: 6px;
        background: var(--bg);
        border: 1.5px solid var(--border);
        cursor: pointer;
        color: #666;
        font-size: 12px;
        transition: background 0.15s, color 0.15s;
        margin-left: auto;
        flex-shrink: 0;
    }

    .collapse-btn:hover { background: var(--border); color: var(--text); }

    .sidebar-brand-row {
        display: flex;
        align-items: center;
        width: 100%;
        gap: 10px;
        overflow: hidden;
    }

    /* ══════════════════════════════
       MAIN CONTENT
    ══════════════════════════════ */
    .main-wrapper {
        margin-left: var(--sidebar-w);
        flex: 1;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        transition: margin-left 0.25s ease;
    }

    .main-wrapper.expanded {
        margin-left: var(--sidebar-collapsed-w);
    }

    /* Top bar */
    .topbar {
        height: 64px;
        background: var(--white);
        border-bottom: 1.5px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 28px;
        position: sticky;
        top: 0;
        z-index: 50;
    }

    .topbar-title {
        font-size: 18px;
        font-weight: 600;
        color: var(--text);
        letter-spacing: -0.2px;
    }

    .topbar-right {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .topbar-user {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: var(--muted);
    }

    /* Page content */
    .page-content {
        flex: 1;
        padding: 28px;
    }

    /* ══════════════════════════════
       MOBILE overlay
    ══════════════════════════════ */
    .sidebar-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.3);
        z-index: 99;
    }

    @media (max-width: 768px) {
        .sidebar {
            left: calc(-1 * var(--sidebar-w));
            width: var(--sidebar-w) !important;
            transition: left 0.25s ease;
        }

        .sidebar.mobile-open {
            left: 0;
        }

        .sidebar-overlay.visible { display: block; }

        .main-wrapper,
        .main-wrapper.expanded {
            margin-left: 0 !important;
        }

        .mobile-menu-btn { display: flex !important; }

        .collapse-btn { display: none; }
    }

    .mobile-menu-btn {
        display: none;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border-radius: 8px;
        background: none;
        border: 1.5px solid var(--border);
        cursor: pointer;
        color: #555;
        font-size: 15px;
    }
    </style>

    <!-- Page-specific head content injected here -->
    <th:block layout:fragment="head"></th:block>
</head>
<body>

<!-- Mobile overlay -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeMobileSidebar()"></div>

<!-- ══ SIDEBAR ══ -->
<nav class="sidebar" id="sidebar">

    <div class="sidebar-brand">
        <div class="sidebar-brand-row">
            <div class="brand-icon"><i class="fas fa-chart-line"></i></div>
            <span class="brand-text">SalesApp</span>
        </div>
    </div>

    <div class="sidebar-nav">

        <div class="nav-section-label">Main</div>

        <a th:href="@{/dashboard}"
           
           class="nav-item" data-tooltip="Dashboard">
            <span class="nav-icon"><i class="fas fa-house"></i></span>
            <span class="nav-label">Dashboard</span>
        </a>

        <div class="nav-section-label" style="margin-top:8px;">Management</div>

        <a th:href="@{/users}"
           class="nav-item" data-tooltip="Users">
            <span class="nav-icon"><i class="fas fa-users"></i></span>
            <span class="nav-label">Users</span>
        </a>

        <a th:href="@{/teams}"
           class="nav-item" data-tooltip="Teams">
            <span class="nav-icon"><i class="fas fa-people-group"></i></span>
            <span class="nav-label">Teams</span>
        </a>

    </div>

    <div class="sidebar-bottom">

        <!-- Logged-in user info -->
        <div class="sidebar-user">
            <div class="user-avatar">
                <span th:text="U">U</span>
            </div>
            <div class="user-info">
                <div class="user-name" th:text="${#authentication.name}">Username</div>
                <div class="user-role" th:text="${#authentication.authorities[0] == 'MANAGER' ? 'Manager' : 'Agent'}">Role</div>
            </div>
        </div>

        <!-- Logout -->
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="logout-btn" data-tooltip="Logout">
                <span class="nav-icon"><i class="fas fa-right-from-bracket"></i></span>
                <span class="nav-label">Logout</span>
            </button>
        </form>

    </div>
</nav>

<!-- ══ MAIN ══ -->
<div class="main-wrapper" id="mainWrapper">

    <!-- Page content injected here -->
    <main class="page-content">
        <div layout:fragment="content">
            <!-- page content goes here -->
        </div>
    </main>

</div>

<script>


/* ── Mobile sidebar ── */
const overlay = document.getElementById('sidebarOverlay');

function openMobileSidebar() {
    sidebar.classList.add('mobile-open');
    overlay.classList.add('visible');
}

function closeMobileSidebar() {
    sidebar.classList.remove('mobile-open');
    overlay.classList.remove('visible');
}
</script>

<!-- Page-specific scripts -->
<th:block layout:fragment="scripts"></th:block>

</body>
</html>
