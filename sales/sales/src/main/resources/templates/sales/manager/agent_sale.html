<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{main/layout}">

<head>
    <title>Agent Sale</title>
</head>

<!-- ══ Extra styles ══ -->
<th:block layout:fragment="head">
<style>
    /* ── Card ── */
    .upload-card {
        background: var(--white);
        border: 1.5px solid var(--border);
        border-radius: 14px;
        padding: 36px 40px;
        max-width: 680px;
        margin: 0 auto;
    }

    .card-title {
        font-size: 20px;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 4px;
    }

    .card-subtitle {
        font-size: 13.5px;
        color: var(--muted);
        margin-bottom: 28px;
    }

    /* ── Form layout ── */
    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px;
        margin-bottom: 18px;
    }

    .form-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
    }

    .form-group.full-col {
        grid-column: 1 / -1;
    }

    /* ── Labels ── */
    .form-label {
        font-size: 13px;
        font-weight: 500;
        color: var(--text);
    }

    .form-label .req {
        color: var(--danger);
        margin-left: 2px;
    }

    /* ── Inputs ── */
    .form-control {
        height: 40px;
        padding: 0 12px;
        border: 1.5px solid var(--border);
        border-radius: 8px;
        font-size: 14px;
        font-family: inherit;
        color: var(--text);
        background: var(--white);
        outline: none;
        width: 100%;
        transition: border-color .15s, box-shadow .15s;
    }

    .form-control:focus {
        border-color: var(--blue);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, .1);
    }

    .form-control::placeholder {
        color: #aaa;
    }

    /* ── Select ── */
    #role {
        height: 40px;
        padding: 0 12px;
        border: 1.5px solid var(--border);
        border-radius: 8px;
        font-size: 14px;
        font-family: inherit;
        color: var(--text);
        background: var(--white);
        outline: none;
        width: 100%;
        transition: border-color .15s, box-shadow .15s;
    }

    #role:focus {
        border-color: var(--blue);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, .1);
    }

    /* ── Textarea ── */
    .form-textarea {
        padding: 10px 12px;
        border: 1.5px solid var(--border);
        border-radius: 8px;
        font-size: 14px;
        font-family: inherit;
        color: var(--text);
        background: var(--white);
        outline: none;
        resize: vertical;
        min-height: 90px;
        width: 100%;
        transition: border-color .15s, box-shadow .15s;
    }

    .form-textarea:focus {
        border-color: var(--blue);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, .1);
    }

    /* ── Divider ── */
    .divider {
        border: none;
        border-top: 1.5px solid var(--border);
        margin: 24px 0;
    }

    /* ── Buttons ── */
    .btn-row {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 4px;
    }

    .btn {
        height: 40px;
        padding: 0 22px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 500;
        font-family: inherit;
        cursor: pointer;
        border: none;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 7px;
        transition: background .15s, box-shadow .15s;
    }

    .btn-cancel {
        background: var(--white);
        border: 1.5px solid var(--border);
        color: var(--text);
    }

    .btn-cancel:hover {
        background: var(--bg);
    }

    .btn-primary {
        background: var(--blue);
        color: #fff;
        min-width: 130px;
        justify-content: center;
    }

    .btn-primary:hover {
        background: var(--blue-dark);
        box-shadow: 0 2px 8px rgba(37, 99, 235, .28);
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
        .upload-card { padding: 24px 18px; }
        .form-row    { grid-template-columns: 1fr; }
    }
</style>
</th:block>

<!-- ══ Page content ══ -->
<div layout:fragment="content">

    <div class="upload-card">

        <h1 class="card-title">Agent Sale</h1>
        <p class="card-subtitle">Check agent sale and update status</p>

        <form th:action="@{/sale_status/update(page=${currentPage}, keyword=${keyword})}"
              method="post"
              enctype="multipart/form-data"
              th:object="${agent_sale}">

            <!-- Row 1: Contract ID + Status -->
            <div class="form-row">
                <div class="form-group">
                    <input type="hidden" th:field="*{id}">
                    <label class="form-label">Contract ID</label>
                    <input class="form-control" type="text" th:value="*{contractId}" readonly/>
                </div>

                <div class="form-group">
                    <label class="form-label" for="role">Status</label>
                    <select id="role" th:field="*{status}">
                            <option value="">— Select a Status —</option>
                            <option value="PENDING">Pending</option>
                            <option value="APPROVED">Approved</option>
                            <option value="REJECTED">Rejected</option>
                    </select>
                </div>
            </div>

            <!-- Row 2: Uploaded At + Agent -->
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Uploaded At</label>
                    <input class="form-control" type="text" th:value="*{uploadedAt}"/>
                </div>

                <div class="form-group">
                    <label class="form-label">Agent</label>
                    <input class="form-control" type="text" th:value="*{agent.username}" readonly/>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group full-col">
                    <label class="form-label" for="saleNote">Note</label>
                    <textarea id="saleNote"
                              class="form-textarea"
                              th:field="*{note}"
                              placeholder="Optional notes about this sale..."
                              readonly></textarea>
                </div>
            </div>

            <!-- Contract File Viewer -->
            <div class="form-group full-col" style="margin-top: 16px;">
                <label class="form-label">Contract File</label>
                <iframe th:src="@{'/file/' + ${agent_sale.id}}"
                        width="100%"
                        height="500px"
                        style="border: 1.5px solid var(--border); border-radius: 8px;">
                </iframe>
            </div>

            <hr class="divider"/>

            <!-- Actions -->
            <div class="btn-row">
                <a th:href="@{/sales}" class="btn btn-cancel">Cancel</a>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-cloud-arrow-up"></i>
                    Upload Sale
                </button>
            </div>

        </form>

    </div>

</div>
<!-- ══ End content ══ -->

</html>
