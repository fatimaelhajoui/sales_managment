<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{main/layout}">

<head>
    <title>My Sale</title>
</head>

<!-- ══ Extra styles ══ -->
<th:block layout:fragment="head">
<style>
    .upload-card {
        background: var(--white);
        border-radius: 14px;
        padding: 36px 40px;
        max-width: 680px;
        margin: 0 auto;
        border: 1.5px solid var(--border);
    }

    .card-title   { font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .card-subtitle{ font-size: 13.5px; color: var(--muted); margin-bottom: 28px; }

    /* ── Grid row ── */
    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px;
        margin-bottom: 18px;
    }

    .form-group          { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full-col { grid-column: 1 / -1; }

    .form-label {
        font-size: 13px;
        font-weight: 500;
        color: var(--text);
    }

    .form-label .req { color: var(--danger); margin-left: 2px; }

    .form-control {
        height: 40px;
        padding: 0 12px;
        border: 1.5px solid var(--border);
        border-radius: 8px;
        font-size: 14px;
        font-family: inherit;
        color: var(--text);
        background: var(--white);
        outline: none;
        transition: border-color .15s, box-shadow .15s;
        width: 100%;
    }

    .form-control:focus {
        border-color: var(--blue);
        box-shadow: 0 0 0 3px rgba(37,99,235,.1);
    }

    .form-control::placeholder { color: #aaa; }

    .field-error {
        font-size: 12px;
        color: var(--danger);
        margin-top: 2px;
    }

    /* ── Drop zone ── */
    .drop-zone {
        border: 2px dashed var(--border);
        border-radius: 10px;
        padding: 28px 20px;
        text-align: center;
        cursor: pointer;
        position: relative;
        transition: border-color .2s, background .2s;
    }

    .drop-zone:hover, .drop-zone.over {
        border-color: var(--blue);
        background: var(--blue-light);
    }

    .drop-zone input[type="file"] {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
        width: 100%;
        height: 100%;
    }

    .drop-icon {
        width: 42px; height: 42px;
        background: var(--blue-light);
        border-radius: 10px;
        display: grid; place-items: center;
        margin: 0 auto 10px;
        color: var(--blue);
    }

    .drop-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
    .drop-hint  { font-size: 12px; color: var(--muted); }
    .drop-hint span { color: var(--blue); font-weight: 500; }

    /* ── File preview ── */
    .file-preview {
        display: none;
        align-items: center;
        gap: 12px;
        background: #f9fafb;
        border: 1.5px solid var(--border);
        border-radius: 8px;
        padding: 11px 14px;
        margin-top: 10px;
    }

    .file-preview.show { display: flex; }

    .fp-icon {
        width: 34px; height: 34px;
        background: var(--blue-light);
        border-radius: 7px;
        display: grid; place-items: center;
        color: var(--blue);
        flex-shrink: 0;
    }

    .fp-name { font-size: 13px; font-weight: 500; }
    .fp-size { font-size: 12px; color: var(--muted); }

    .fp-remove {
        margin-left: auto;
        background: none; border: none;
        color: var(--muted); cursor: pointer;
        padding: 4px; border-radius: 6px;
        display: grid; place-items: center;
        transition: background .15s, color .15s;
    }
    .fp-remove:hover { background: #fee2e2; color: var(--danger); }

    /* ── Divider ── */
    .divider { border: none; border-top: 1.5px solid var(--border); margin: 24px 0; }

    /* ── Alerts ── */
    .alert {
        padding: 11px 14px;
        border-radius: 8px;
        font-size: 13px;
        margin-bottom: 20px;
        display: none;
    }
    .alert.show    { display: block; }
    .alert-error   { background: #fef2f2; color: #b91c1c; border: 1.5px solid #fecaca; }
    .alert-success { background: #f0fdf4; color: #15803d; border: 1.5px solid #bbf7d0; }

    /* ── Buttons ── */
    .btn-row {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 4px;
    }

    .btn {
        height: 40px;
        padding: 0 22px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 500;
        font-family: inherit;
        cursor: pointer;
        border: none;
        transition: background .15s, box-shadow .15s;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 7px;
    }

    .btn-cancel {
        background: var(--white);
        border: 1.5px solid var(--border);
        color: var(--text);
    }
    .btn-cancel:hover { background: var(--bg); }

    .btn-primary {
        background: var(--blue);
        color: #fff;
        min-width: 130px;
        justify-content: center;
    }
    .btn-primary:hover {
        background: var(--blue-dark);
        box-shadow: 0 2px 8px rgba(37,99,235,.28);
    }

    @media (max-width: 600px) {
        .upload-card  { padding: 24px 18px; }
        .form-row     { grid-template-columns: 1fr; }
    }
</style>
</th:block>

<!-- ══ Page content ══ -->
<div layout:fragment="content">

    <div class="upload-card">

        <h1 class="card-title">My Sale</h1>
        <p class="card-subtitle">Check your sale</p>

       
        <!-- Form -->
        <form th:object="${my_sale}">

    <div class="form-row">
        <div class="form-group">
            <label class="form-label">Contract ID</label>
            <input class="form-control" type="text" th:value="*{contractId}" readonly/>
        </div>

        <div class="form-group">
            <label class="form-label">Status</label>
            <input class="form-control" type="text" th:value="*{status}" readonly/>
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label class="form-label">Uploaded At</label>
            <input class="form-control" type="text" th:value="*{uploadedAt}" readonly/>
        </div>

        <div class="form-group">
            <label class="form-label">Note</label>
            <input class="form-control" type="text" th:value="*{note}" readonly/>
        </div>
    </div>

    <!-- PDF Viewer -->
    <div class="form-group full-col" style="margin-top:16px;">
        <label class="form-label">Contract File</label>
        <iframe th:src="@{/file/*{my_sale.id}}"
                width="100%" height="500px"
                style="border:1.5px solid var(--border); border-radius:8px;">
        </iframe>
    </div>

</form>
    </div>

</div>

<!-- ══ Scripts ══ -->
<th:block layout:fragment="scripts">
<script>
    const dropZone  = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const preview   = document.getElementById('filePreview');
    const fpName    = document.getElementById('fpName');
    const fpSize    = document.getElementById('fpSize');
    const fpRemove  = document.getElementById('fpRemove');

    function fmtBytes(b) {
        if (b < 1024)    return b + ' B';
        if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
        return (b / 1048576).toFixed(1) + ' MB';
    }

    function showPreview(file) {
        fpName.textContent = file.name;
        fpSize.textContent = fmtBytes(file.size);
        preview.classList.add('show');
        dropZone.style.display = 'none';
    }

    function clearFile() {
        fileInput.value = '';
        preview.classList.remove('show');
        dropZone.style.display = '';
    }

    fileInput.addEventListener('change', () => {
        if (fileInput.files.length) showPreview(fileInput.files[0]);
    });

    fpRemove.addEventListener('click', clearFile);

    dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
    dropZone.addEventListener('drop', e => {
        e.preventDefault();
        dropZone.classList.remove('over');
        if (e.dataTransfer.files.length) {
            fileInput.files = e.dataTransfer.files;
            showPreview(e.dataTransfer.files[0]);
        }
    });
</script>
</th:block>

</html>
